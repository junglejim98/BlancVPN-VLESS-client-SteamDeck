name: Build Steam Deck AppImage

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build AppImage
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: source/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: source/frontend/package-lock.json

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            squashfs-tools

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Download appimagetool
        working-directory: source
        run: |
          mkdir -p build/tools
          curl -L \
            -o build/tools/appimagetool-x86_64.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x build/tools/appimagetool-x86_64.AppImage

      - name: Build Linux binary
        working-directory: source
        run: ~/go/bin/wails build -clean -nopackage -platform linux/amd64 -tags webkit2_41 -o ff-vless

      - name: Build Steam Deck package
        working-directory: source
        run: bash build/steamdeck/package-steamdeck.sh

      - name: Build installer AppImage
        working-directory: source
        run: bash build/steamdeck/package-appimage.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ff-vless-steamdeck
          path: |
            source/build/dist/steamdeck/FF-Vless-Installer-x86_64.AppImage
            source/build/dist/steamdeck/FF-Vless-SteamDeck.tar.gz
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            source/build/dist/steamdeck/FF-Vless-Installer-x86_64.AppImage
            source/build/dist/steamdeck/FF-Vless-SteamDeck.tar.gz
